name: Publish

on:
  release:
    types: [published]

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests
        run: uv run pytest packages/pysypt/tests/ packages/config/tests/ packages/logger/tests/ -v

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build packages
        run: |
          uv build --package alt-python-common
          uv build --package alt-python-pysypt
          uv build --package alt-python-config
          uv build --package alt-python-logger

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: |
          uv publish dist/*

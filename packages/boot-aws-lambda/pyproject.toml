[project]
name = "alt-python-boot-aws-lambda"
version = "1.0.0"
description = "AWS Lambda adapter for alt-python/boot"
requires-python = ">=3.12"
dependencies = [
    "alt-python-boot-lib",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["boot_aws_lambda"]

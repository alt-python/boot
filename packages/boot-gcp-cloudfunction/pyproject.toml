[project]
name = "alt-python-boot-gcp-cloudfunction"
version = "1.0.0"
description = "GCP Cloud Functions adapter for alt-python/boot"
requires-python = ">=3.12"
dependencies = [
    "alt-python-boot-lib",
    "flask>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["boot_gcp_cloudfunction"]

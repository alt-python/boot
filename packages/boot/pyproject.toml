[project]
name = "alt-python-boot-lib"
version = "1.0.0"
description = "Spring-inspired bootstrap package for Python"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-config",
    "alt-python-logger",
    "alt-python-cdi",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["boot"]

[tool.uv.sources]
alt-python-config = { workspace = true }
alt-python-logger = { workspace = true }
alt-python-cdi = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

[project]
name = "alt-python-cdi"
version = "1.1.1"
description = "Spring-inspired CDI (Context and Dependency Injection) for Python"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-config",
    "alt-python-logger",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["cdi"]

[tool.uv.sources]
alt-python-config = { workspace = true }
alt-python-logger = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

[project]
name = "alt-python-config"
version = "1.1.0"
description = "Spring-inspired profile-aware config for Python"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-pysypt",
    "alt-python-common",
    "PyYAML>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["config"]

[tool.uv.sources]
alt-python-pysypt = { workspace = true }
alt-python-common = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

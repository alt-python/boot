[project]
name = "alt-python-flyway"
version = "1.1.1"
description = "Flyway-inspired versioned SQL migration engine for Python"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-boot-pydbc",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["flyway"]

[tool.uv.sources]
alt-python-boot-pydbc = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

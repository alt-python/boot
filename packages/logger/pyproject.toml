[project]
name = "alt-python-logger"
version = "1.0.1"
description = "Spring-inspired config-driven logger for Python"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-config",
    "alt-python-common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["logger"]

[tool.uv.sources]
alt-python-config = { workspace = true }
alt-python-common = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

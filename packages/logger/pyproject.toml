[project]
name = "logger"
version = "0.1.0"
description = "Spring-inspired config-driven logger for Python"
requires-python = ">=3.12"
dependencies = [
    "config",
    "common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
config = { workspace = true }
common = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]

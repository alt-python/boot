[project]
name = "pysypt"
version = "0.1.0"
description = "Jasypt-compatible PBE encryption and digest for Python"
requires-python = ">=3.12"
dependencies = [
    "cryptography>=42.0",
    "common",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
common = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
